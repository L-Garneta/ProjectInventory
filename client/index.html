<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Baru</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-hospital"></i>
                    <span>Inventory Baru</span>
                </div>
                <button class="toggle-sidebar" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" onclick="loadPage('dashboard')">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#master-barang" class="nav-item" onclick="loadPage('master-barang')">
                    <i class="fas fa-boxes"></i>
                    <span>Master Barang</span>
                </a>
                <a href="#transaksi-masuk" class="nav-item" onclick="loadPage('transaksi-masuk')">
                    <i class="fas fa-arrow-down"></i>
                    <span>Barang Masuk</span>
                </a>
                <a href="#transaksi-keluar" class="nav-item" onclick="loadPage('transaksi-keluar')">
                    <i class="fas fa-arrow-up"></i>
                    <span>Barang Keluar</span>
                </a>
                <a href="#laporan" class="nav-item" onclick="loadPage('laporan')">
                    <i class="fas fa-chart-bar"></i>
                    <span>Laporan</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Admin</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <div class="loading-spinner" id="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Memuat...</span>
            </div>

            <div id="page-content">
                <!-- Content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>

</html>
