<div class="transaksi-masuk">
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-arrow-down"></i> Barang Masuk</h2>
        </div>
        <div class="card-body">
            <form id="form-masuk">
                <div class="form-group">
                    <label>Nama Barang *</label>
                    <input type="text" name="namaBarang" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Kode Barang</label>
                        <input type="text" name="kodeBarang" placeholder="NEW untuk kode baru">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select name="kategori">
                            <option value="">Pilih Kategori</option>
                            ${config.kategori.map(k => `<option value="${k}">${k}</option>`).join('')}
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Ruangan *</label>
                        <select name="ruangan" required>
                            <option value="">Pilih Ruangan</option>
                            ${config.ruangan.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Satuan</label>
                        <select name="satuan">
                            <option value="">Pilih Satuan</option>
                            ${config.satuan.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Jumlah *</label>
                        <input type="number" name="jumlah" required min="1">
                    </div>
                    <div class="form-group">
                        <label>Supplier</label>
                        <input type="text" name="supplier">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Keterangan</label>
                    <textarea name="keterangan" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Simpan
                    </button>
                    <button type="reset" class="btn btn-outline">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
