<div class="laporan">
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-chart-bar"></i> Laporan</h2>
        </div>
        <div class="card-body">
            <form id="form-laporan">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipe Laporan</label>
                        <select name="tipe">
                            <option value="semua">Semua</option>
                            <option value="masuk">Barang Masuk</option>
                            <option value="keluar">Barang Keluar</option>
                            <option value="stok">Stok Barang</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Ruangan</label>
                        <select name="ruangan">
                            <option value="semua">Semua Ruangan</option>
                            ${config.ruangan.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Tanggal Mulai</label>
                        <input type="date" name="startDate">
                    </div>
                    <div class="form-group">
                        <label>Tanggal Akhir</label>
                        <input type="date" name="endDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-filter"></i> Tampilkan
                    </button>
                    <button type="button" class="btn btn-success" onclick="exportLaporan()">
                        <i class="fas fa-download"></i> Export Excel
                    </button>
                </div>
            </form>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Tipe</th>
                            <th>Tanggal</th>
                            <th>Nama Barang</th>
                            <th>Kategori</th>
                            <th>Ruangan</th>
                            <th>Jumlah/Stok</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="laporan-list">
                        <tr><td colspan="7" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
