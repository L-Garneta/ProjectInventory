<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSI KP - Sistem Inventaris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SISTEM INVENTARIS BARANG</h1>
            <p>APSI KP - Manajemen Inventaris</p>
        </header>

        <main>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Barang</h3>
                    <p id="totalBarang">0</p>
                </div>
                <div class="stat-card">
                    <h3>Kategori</h3>
                    <p id="totalKategori">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Nilai</h3>
                    <p id="totalNilai">Rp 0</p>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Cari barang...">
                <select id="kategoriFilter">
                    <option value="all">Semua Kategori</option>
                </select>
            </div>

            <div class="table-container">
                <table id="inventarisTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Barang</th>
                            <th>Kategori</th>
                            <th>Jumlah</th>
                            <th>Harga Satuan</th>
                            <th>Total Harga</th>
                            <th>Lokasi</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data akan diisi oleh JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
