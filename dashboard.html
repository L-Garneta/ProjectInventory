<div class="dashboard">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon primary">
                <i class="fas fa-boxes"></i>
            </div>
            <div class="stat-info">
                <h3>Total Barang</h3>
                <div class="stat-value" id="total-barang">0</div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon warning">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="stat-info">
                <h3>Barang Kritis</h3>
                <div class="stat-value" id="barang-kritis">0</div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon secondary">
                <i class="fas fa-arrow-down"></i>
            </div>
            <div class="stat-info">
                <h3>Barang Masuk</h3>
                <div class="stat-value" id="total-masuk">0</div>
                <div class="stat-label" id="bulan-info"></div>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon danger">
                <i class="fas fa-arrow-up"></i>
            </div>
            <div class="stat-info">
                <h3>Barang Keluar</h3>
                <div class="stat-value" id="total-keluar">0</div>
                <div class="stat-label" id="bulan-info"></div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-exclamation-circle"></i> Barang Kritis</h2>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Kode</th>
                            <th>Nama Barang</th>
                            <th>Stok</th>
                            <th>Min Stok</th>
                        </tr>
                    </thead>
                    <tbody id="kritis-list">
                        <tr><td colspan="4" class="text-center">Tidak ada barang kritis</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
