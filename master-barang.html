<div class="master-barang">
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-boxes"></i> Master Barang</h2>
            <button class="btn btn-primary" onclick="showTambahBarang()">
                <i class="fas fa-plus"></i> Tambah Barang
            </button>
        </div>
        <div class="card-body">
            <div class="search-box">
                <input type="text" id="searchBarang" placeholder="Cari barang..." onkeyup="searchTable('searchBarang', 'master-table')">
            </div>
            
            <div class="table-responsive">
                <table id="master-table">
                    <thead>
                        <tr>
                            <th>Kode</th>
                            <th>Nama Barang</th>
                            <th>Kategori</th>
                            <th>Ruangan</th>
                            <th>Satuan</th>
                            <th>Stok</th>
                            <th>Min Stok</th>
                            <th>Deskripsi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="master-barang-list">
                        <tr><td colspan="9" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
